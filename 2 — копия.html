<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кулинарная книга-калькулятор</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
<style>
body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:20px}
.container{max-width:1600px;margin:auto}.card{background:#fff;padding:20px;border-radius:12px;margin-bottom:20px}
.carousel{display:flex;gap:15px;overflow-x:auto;padding:10px;background:#111;border-radius:12px}
.recipe-card{min-width:250px;padding:15px;background:#222;color:#fff;border-radius:10px;cursor:pointer}
button{padding:10px 15px;border:none;border-radius:8px;cursor:pointer}
.primary{background:#ff6b00;color:#fff}.success{background:#1f9d55;color:#fff}.danger{background:#d62828;color:#fff}
input,select,textarea{width:100%;padding:8px;margin:5px 0;box-sizing:border-box}
table{width:100%;border-collapse:collapse}th,td{border:1px solid #ddd;padding:8px;word-break:break-word}
.hidden{display:none}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
</style>
</head>
<body>
<div class="container">
<div class="card">
<h2>Карусель рецептов</h2>
<div id="recipeCarousel" class="carousel"></div>
<button class="primary" onclick="createRecipe()">Добавить рецепт</button>
</div>
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center">
<h2>База ингредиентов</h2>
<button id="ingredientBaseToggle" class="primary" onclick="toggleIngredientBase()">▼ Закрыть базу ингредиентов</button>
</div>
<div id="ingredientBaseBlock">
<input type="file" accept=".xlsx,.xls" onchange="importBaseExcel(event)">
<button class="primary" onclick="addIngredientRow()">Добавить ингредиент</button>
<table id="ingredientBaseTable">
<thead><tr><th>Ингредиент</th><th>Цена</th><th>Вес упаковки</th><th>Цена за грамм</th><th>Удалить</th></tr></thead>
<tbody></tbody>
</table>
</div>
</div>
<datalist id="ingredientSuggestions"></datalist>
<div id="recipeEditor"></div>
</div>
<script>
let recipes=JSON.parse(localStorage.getItem('recipes')||'[]');
let ingredientBase=JSON.parse(localStorage.getItem('ingredientBase')||'[]');
const systemCategories=['Ганаш','Декор','Упаковка'];

function saveAll(){
 localStorage.setItem('recipes',JSON.stringify(recipes));
 localStorage.setItem('ingredientBase',JSON.stringify(ingredientBase));
 renderCarousel();
 renderIngredientBase();
}

function toggleIngredientBase(){
 const block=document.getElementById('ingredientBaseBlock');
 const btn=document.getElementById('ingredientBaseToggle');
 block.classList.toggle('hidden');
 btn.textContent=block.classList.contains('hidden')?'▶ Открыть базу ингредиентов':'▼ Закрыть базу ингредиентов';
}

function createRecipe(){
 const recipe={id:Date.now(),name:'Новый рецепт',baseWeight:0,initialBaseWeight:0,initialRoundForm:'',targetWeight:0,roundForm:0,squareForm:0,locked:false,lastOpenedCategory:'',ingredients:[],technology:{},notes:''};
 recipes.push(recipe);
 saveAll();
 openRecipe(recipe.id);
}

function deleteRecipe(id){
 recipes=recipes.filter(r=>r.id!==id);
 saveAll();
 document.getElementById('recipeEditor').innerHTML='';
}

function renderCarousel(){
 const el=document.getElementById('recipeCarousel');
 el.innerHTML='';
 recipes.forEach(recipe=>{
  const card=document.createElement('div');
  card.className='recipe-card';
  card.textContent=recipe.name;
  card.onclick=function(){openRecipe(recipe.id)};
  el.appendChild(card);
 });
}

function addIngredientRow(){ingredientBase.push({name:'',price:0,packWeight:0,gramPrice:0});saveAll();}
function updateBase(index,key,value){ingredientBase[index][key]=key==='name'?value:Number(value);saveAll();}
function removeBase(index){ingredientBase.splice(index,1);saveAll();}

function renderIngredientBase(){
 const tbody=document.querySelector('#ingredientBaseTable tbody');
 const suggestions=document.getElementById('ingredientSuggestions');
 tbody.innerHTML='';
 suggestions.innerHTML='';
 ingredientBase.forEach((item,index)=>{
  item.gramPrice=item.packWeight>0?(item.price/item.packWeight).toFixed(3):0;
  const tr=document.createElement('tr');
  tr.innerHTML='<td><input value="'+item.name+'" onchange="updateBase('+index+',\'name\',this.value)"></td>'+
               '<td><input type="number" value="'+item.price+'" onchange="updateBase('+index+',\'price\',this.value)"></td>'+
               '<td><input type="number" value="'+item.packWeight+'" onchange="updateBase('+index+',\'packWeight\',this.value)"></td>'+
               '<td>'+item.gramPrice+'</td>'+
               '<td><button class="danger" onclick="removeBase('+index+')">X</button></td>';
  tbody.appendChild(tr);
  const option=document.createElement('option');
  option.value=item.name;
  suggestions.appendChild(option);
 });
}

function recalcRecipe(recipe){
 const excluded=['Упаковка'];
 const calculatedBase=Math.round(
  recipe.ingredients
   .filter(i=>!excluded.includes(i.category))
   .reduce((s,i)=>s+(Number(i.weight)||0),0)
 );
 if(!recipe.initialBaseWeight || recipe.initialBaseWeight<=0){
   recipe.initialBaseWeight=calculatedBase;
 }
 recipe.baseWeight=recipe.initialBaseWeight;
 if((recipe.initialRoundForm==='' || recipe.initialRoundForm===0) && recipe.locked){
   recipe.initialRoundForm=Number(recipe.roundForm)||0;
 }
 const baseWeight=Number(recipe.initialBaseWeight)||0;
 const targetWeight=Number(recipe.targetWeight)||0;
 const baseForm=Number(recipe.initialRoundForm)||0;
 if(baseWeight>0 && targetWeight>0 && baseForm>0){
   const ratio=targetWeight/baseWeight;
   recipe.roundForm=Math.round(baseForm*Math.sqrt(ratio)+1);
   recipe.squareForm=Math.round((baseForm*Math.sqrt(ratio))*0.905+1);
 }
 autoGanash(recipe);
}

function autoGanash(recipe){
 recipe.ingredients=recipe.ingredients.filter(i=>i.category!=='Ганаш');
 if(!recipe.targetWeight)return;
 const chocolate=Math.round(recipe.targetWeight*0.026);
 const butter=Math.round(chocolate/2);
 recipe.ingredients.push({category:'Ганаш',name:'Темный шоколад',weight:chocolate});
 recipe.ingredients.push({category:'Ганаш',name:'Масло сливочное 82,5%',weight:butter});
}

function openRecipe(id){
 const recipe=recipes.find(r=>r.id===id);
 if(!recipe)return;
 recalcRecipe(recipe);
 const editor=document.getElementById('recipeEditor');
 const recipeCategories=[...new Set(recipe.ingredients.map(i=>i.category).filter(Boolean))];
 const orderedSystemCategories=['Ганаш','Декор','Упаковка'];
 const categories=[...recipeCategories.filter(c=>!orderedSystemCategories.includes(c)),...orderedSystemCategories];
 let rows='';
 recipe.ingredients.forEach((ing,index)=>{
  let options='';
  categories.forEach(cat=>{
   options+='<option '+(cat===ing.category?'selected':'')+'>'+cat+'</option>';
  });
  rows+='<tr>'+
        '<td><select onchange="updateIngredientCategory('+id+','+index+',this.value)">'+options+'</select></td>'+
        '<td><input list="ingredientSuggestions" value="'+ing.name+'" oninput="updateIngredientName('+id+','+index+',this.value)"></td>'+
        '<td><input type="number" value="'+ing.weight+'" onchange="updateIngredientWeight('+id+','+index+',this.value)"></td>'+
        '<td><button class="danger" onclick="removeRecipeIngredient('+id+','+index+')">X</button></td>'+
        '</tr>';
  });

 let groupedRows='';
 categories.forEach(cat=>{
  const categoryRows=recipe.ingredients.filter(i=>i.category===cat).map((ing,index)=>{
   const realIndex=recipe.ingredients.indexOf(ing);
   let options='';
   categories.forEach(optionCat=>{
    options+='<option '+(optionCat===ing.category?'selected':'')+'>'+optionCat+'</option>';
   });
   return '<tr>'+
          '<td><select onchange="updateIngredientCategory('+id+','+realIndex+',this.value)">'+options+'</select></td>'+
          '<td><input list="ingredientSuggestions" value="'+ing.name+'" oninput="updateIngredientName('+id+','+realIndex+',this.value)"></td>'+
          '<td><input type="number" value="'+ing.weight+'" onchange="updateIngredientWeight('+id+','+realIndex+',this.value)"></td>'+
          '<td><button class="danger" onclick="removeRecipeIngredient('+id+','+realIndex+')">X</button></td>'+
          '</tr>';
  }).join('');

  const techValue=(recipe.technology&&recipe.technology[cat])?recipe.technology[cat]:'';

  groupedRows+='<details '+(recipe.lastOpenedCategory===cat?'open':'')+'>'+
               '<summary onclick="setOpenedCategory('+id+', &quot;'+cat+'&quot;)"><strong>'+cat+'</strong></summary>'+
               '<table><thead><tr><th>Категория</th><th>Ингредиент</th><th>Вес</th><th>Удалить</th></tr></thead><tbody>'+categoryRows+'</tbody></table>'+
               '<textarea placeholder="Технология '+cat+'" onchange="updateTechnology('+id+',\''+cat+'\',this.value)">'+techValue+'</textarea>'+
               '</details>';
 });

 editor.innerHTML='<div class="card">'+
 '<input value="'+recipe.name+'" onchange="updateRecipeName('+id+',this.value)">'+
 '<div class="grid">'+
 '<div><label>Начальный вес</label><input readonly value="'+recipe.baseWeight+'"></div>'+'<div><label>Начальная форма</label><input '+(recipe.locked?'readonly':'')+' value="'+(recipe.initialRoundForm||'')+'" onchange="updateRecipeField('+id+',\'initialRoundForm\',this.value)"></div>'+
 '<div><label>Нужный вес</label><input value="'+recipe.targetWeight+'" onchange="updateRecipeField('+id+',\'targetWeight\',this.value)"></div>'+
 '<div><label>Рекомендуемая круглая форма</label><input readonly value="'+recipe.roundForm+'"></div>'+
 '<div><label>Квадратная форма</label><input readonly value="'+recipe.squareForm+'"></div>'+
 '</div>'+
 '<div class="grid">'+
 '<button class="success" onclick="lockRecipe("+id+")">Сохранить рецепт</button>'+
 '<button class="primary" onclick="openRecipe('+id+')">Редактировать рецепт</button>'+
 '<button class="danger" onclick="deleteRecipe('+id+')">Удалить рецепт</button>'+
 '</div>'+
 '<div class="grid">'+
 '<button class="primary" onclick="toggleAllCategories(true)">Свернуть все</button>'+
 '<button class="primary" onclick="toggleAllCategories(false)">Развернуть все</button>'+
 '</div>'+
 '<input type="file" accept=".xlsx,.xls" onchange="importRecipeExcel(event,'+id+')">'+
 groupedRows+
 '<button class="primary" onclick="addRecipeIngredient('+id+')">Добавить ингредиент</button>'+
 '<div class="card">'+
 '<h3>Финансовая информация</h3>'+
 '<div class="grid">'+
 '<div><label>Себестоимость</label><input readonly value="'+calculateCost(recipe)+'"></div>'+
 '<div><label>Цена продажи</label><input type="number" value="'+(recipe.salePrice||0)+'" onchange="updateRecipeField('+id+',\'salePrice\',this.value)"></div>'+
 '<div><label>Наценка</label><input readonly value="'+calculateMarkup(recipe)+'"></div>'+
 '<div><label>Чистая прибыль</label><input readonly value="'+calculateProfit(recipe)+'"></div>'+
'<div><label>Доставка (сумма)</label><input type="number" value="'+(recipe.deliveryCost||0)+'" onchange="updateRecipeField('+id+',\'deliveryCost\',this.value)"></div>'+
 '</div>'+
 '</div>'+
 '<textarea onchange="updateNotes('+id+',this.value)">'+recipe.notes+'</textarea>'+
 '<div class="grid">'+
 '<button class="primary" onclick="printShoppingList('+id+')">Печать закупки</button>'+
 '<button class="primary" onclick="printTechCard('+id+')">Печать техкарты</button>'+
'<button class="primary" onclick="printCostTable('+id+')">Таблица себестоимости</button>'+
 '<button class="success" onclick="exportPDF('+id+')">Сохранить PDF</button>'+
 '</div>'+
 '</div>';
}

function setOpenedCategory(id,category){const r=recipes.find(x=>x.id===id);if(r){r.lastOpenedCategory=category;saveAll();}}
function updateRecipeName(id,val){const r=recipes.find(x=>x.id===id);if(r){r.name=val;saveAll();}}
function toggleAllCategories(collapse){
 const blocks=document.querySelectorAll('#recipeEditor details');
 blocks.forEach(block=>{
   block.open=!collapse;
 });
}
function addRecipeIngredient(id){
 const r=recipes.find(x=>x.id===id);
 if(!r)return;
 r.ingredients.push({
  category:'Упаковка',
  name:'',
  weight:1,
  unit:'шт'
 });
 saveAll();
 openRecipe(id);
}
function lockRecipe(id){
 const r=recipes.find(x=>x.id===id);
 if(!r)return;
 r.locked=true;
 if(!r.initialRoundForm || r.initialRoundForm<=0){
   r.initialRoundForm=Number(r.roundForm)||0;
 }
 saveAll();
 openRecipe(id);
}

function updateRecipeField(id,key,val){
 const r=recipes.find(x=>x.id===id);
 if(!r)return;
 if(key==='initialRoundForm'){
   if(r.locked)return;
   r.initialRoundForm=Number(val)||0;
   r.roundForm=Number(val)||0;
   saveAll();
   openRecipe(id);
   return;
 }
 const num=Number(val)||0;
 if(key==='targetWeight'){
   r.targetWeight=num;
   const base=r.initialBaseWeight||0;
   if(base>0 && num>0){
     const ratio=num/base;
     r.ingredients.forEach(i=>{
       if(i.category!=='Упаковка' && i.category!=='Доставка' && i.category!=='Ганаш'){
         const original=Number(i.baseWeight||i.weight)||0;
         i.weight=Math.round(original*ratio);
       }
     });
   }
   recalcRecipe(r);
   openRecipe(id);
   return;
 }
 r[key]=num;
 saveAll();
 openRecipe(id);
}
function calculateCost(recipe){
 let total=0;
 recipe.ingredients.filter(i=>i.category!=='Упаковка').forEach(i=>{
   const base=ingredientBase.find(b=>b.name===i.name);
   if(base){
     total+=(Number(base.gramPrice)||0)*(Number(i.weight)||0);
   }
 });
 return Math.round(total);
}
function calculateMarkup(recipe){
 const cost=calculateCost(recipe)+(Number(recipe.deliveryCost)||0);
 const sale=Number(recipe.salePrice)||0;
 return cost>0?Math.round(((sale-cost)/cost)*100):0;
}
function calculateProfit(recipe){
 const cost=calculateCost(recipe)+(Number(recipe.deliveryCost)||0);
 const sale=Number(recipe.salePrice)||0;
 return Math.round(sale-cost);
}

function printCostTable(id){
 const recipe=recipes.find(r=>r.id===id);
 if(!recipe)return;
 const win=safeOpenWindow('Себестоимость');
 if(!win)return;
 const title=win.document.createElement('h1');
 title.textContent=recipe.name+' — Себестоимость';
 win.document.body.appendChild(title);
 const totalSale=Number(recipe.salePrice)||0;
 const totalWeight=recipe.ingredients.filter(i=>i.category!=='Упаковка').reduce((s,i)=>s+(Number(i.weight)||0),0)||1;
 recipe.ingredients.forEach(i=>{
   const base=ingredientBase.find(b=>b.name===i.name);
   const cost=base?Math.round((Number(base.gramPrice)||0)*(Number(i.weight)||0)):0;
   const salePart=i.category==='Упаковка'?0:Math.round((Number(i.weight)||0)/totalWeight*totalSale);
   const row=win.document.createElement('p');
   row.textContent=i.name+' | Себестоимость: '+cost+' ₽ | Продажа: '+salePart+' ₽';
   win.document.body.appendChild(row);
 });
 const delivery=win.document.createElement('p');
 delivery.textContent='Доставка: '+(recipe.deliveryCost||0)+' ₽';
 win.document.body.appendChild(delivery);
 setTimeout(function(){win.print();},300);
}
function updateIngredientCategory(id,index,val){const r=recipes.find(x=>x.id===id);if(r){r.ingredients[index].category=val;saveAll();}}
function updateIngredientName(id,index,val){const r=recipes.find(x=>x.id===id);if(r){r.ingredients[index].name=val;saveAll();}}
function updateIngredientWeight(id,index,val){const r=recipes.find(x=>x.id===id);if(r){const num=Number(val)||0;r.ingredients[index].weight=num;r.ingredients[index].baseWeight=num;if(!r.initialBaseWeight){r.initialBaseWeight=0;}saveAll();openRecipe(id);}}
function removeRecipeIngredient(id,index){const r=recipes.find(x=>x.id===id);if(r){r.ingredients.splice(index,1);saveAll();openRecipe(id);}}
function updateTechnology(id,category,val){const r=recipes.find(x=>x.id===id);if(r){r.technology[category]=val;saveAll();}}
function updateNotes(id,val){const r=recipes.find(x=>x.id===id);if(r){r.notes=val;saveAll();}}

function importBaseExcel(event){
 const file=event.target.files[0];
 if(!file)return;
 const reader=new FileReader();
 reader.onload=function(e){
  const data=new Uint8Array(e.target.result);
  const workbook=XLSX.read(data,{type:'array'});
  const sheet=workbook.Sheets[workbook.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
  rows.forEach((row,index)=>{
   if(index===0)return;
   const name=String(row[0]||'').trim();
   const price=Number(row[1])||0;
   const packWeight=Number(row[2])||0;
   if(name){
    ingredientBase.push({
      name:name,
      price:price,
      packWeight:packWeight,
      gramPrice:packWeight>0?(price/packWeight).toFixed(3):0
    });
   }
  });
  saveAll();
 };
 reader.readAsArrayBuffer(file);
}
function importRecipeExcel(event,id){
 const file=event.target.files[0];
 if(!file)return;
 const recipe=recipes.find(r=>r.id===id);
 if(!recipe)return;
 const reader=new FileReader();
 reader.onload=function(e){
  const data=new Uint8Array(e.target.result);
  const workbook=XLSX.read(data,{type:'array'});
  const sheet=workbook.Sheets[workbook.SheetNames[0]];
  const rows=XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
  recipe.ingredients=[];
  recipe.technology={};
  let currentCategory='';
  rows.forEach((row,index)=>{
   if(index===0)return;
   const category=String(row[0]||'').trim();
   const ingredient=String(row[1]||'').trim();
   const weight=Number(String(row[2]||'').replace(',','.'))||0;
   const technology=String(row[3]||'').trim();
   if(category) currentCategory=category;
   if(ingredient){
    recipe.ingredients.push({category:currentCategory,name:ingredient,weight:weight,baseWeight:weight});
   }
   if(currentCategory && technology){
    recipe.technology[currentCategory]=technology;
   }
  });
  recipe.initialBaseWeight=recipe.ingredients
   .filter(i=>i.category!=='Упаковка' && i.category!=='Доставка')
   .reduce((sum,i)=>sum+(Number(i.baseWeight)||0),0);
  recipe.baseWeight=recipe.initialBaseWeight;
  recipe.targetWeight=recipe.initialBaseWeight;
  saveAll();
  openRecipe(id);
 };
 reader.readAsArrayBuffer(file);
}

function safeOpenWindow(title){
 const win=window.open('','_blank');
 if(!win){alert('Разрешите всплывающие окна');return null;}
 win.document.open();
 win.document.write('<html><head><title>'+title+'</title><style>@page{size:A4;margin:12mm}body{font-family:"Times New Roman",serif;font-size:12px;margin:0;line-height:1.15;color:#000}h1{font-size:18px;margin:0 0 8px 0;line-height:1.2}h2{font-size:14px;margin:8px 0 4px 0;line-height:1.2}h3{font-size:12px;margin:6px 0 4px 0;line-height:1.2}p,div{margin:0 0 2px 0;padding:0;line-height:1.15}table{width:100%;border-collapse:collapse;font-size:11px}td,th{padding:2px 4px;vertical-align:top}*{page-break-inside:avoid;} .compact{margin-bottom:8px;} .section{margin-bottom:10px;}</style></head><body></body></html>');
 win.document.close();
 return win;
}

function printShoppingList(id){
 const recipe=recipes.find(r=>r.id===id); if(!recipe)return;
 const grouped={};
 recipe.ingredients.forEach(i=>{if(!grouped[i.name]) grouped[i.name]=0; grouped[i.name]+=Number(i.weight)||0;});
 const win=safeOpenWindow('Закупка'); if(!win)return;
 Object.keys(grouped).forEach(name=>{
  const p=win.document.createElement('p');
  const item=recipe.ingredients.find(i=>i.name===name);
  p.textContent=name+' — '+Math.round(grouped[name])+' '+((item&&item.category==='Упаковка')?'шт':'гр');
  win.document.body.appendChild(p);
 });
 setTimeout(function(){win.print();},300);
}

function printTechCard(id){
 const recipe=recipes.find(r=>r.id===id);
 if(!recipe)return;
 const win=safeOpenWindow('Техкарта');
 if(!win)return;
 const title=win.document.createElement('h1');
 title.innerHTML=recipe.name+'<br><span style="font-size:0.33em;font-weight:normal;">ТЕХНОЛОГИЧЕСКАЯ КАРТА</span>';
 const info=win.document.createElement('div');
 info.style.marginBottom='20px';
 info.innerHTML='Нужный вес: '+recipe.targetWeight+' гр<br>Форма круглая: '+recipe.roundForm+'<br>Форма квадратная: '+recipe.squareForm;
 win.document.body.appendChild(title);
 win.document.body.appendChild(info);
 const categories=[...new Set(recipe.ingredients.map(i=>i.category))];
 categories.forEach(cat=>{
   const h=win.document.createElement('h2');
   h.textContent=cat;
   win.document.body.appendChild(h);
   recipe.ingredients.filter(i=>i.category===cat).forEach(i=>{
      const p=win.document.createElement('p');
      p.textContent=i.name+' — '+i.weight+' гр';
      win.document.body.appendChild(p);
   });
   if(recipe.technology && recipe.technology[cat]){
      const tech=win.document.createElement('div');
      tech.innerHTML='<strong>Технология:</strong> '+recipe.technology[cat];
      win.document.body.appendChild(tech);
   }
 });
 if(recipe.notes){
   const notes=win.document.createElement('div');
   notes.innerHTML='<strong>Примечания:</strong> '+recipe.notes;
   win.document.body.appendChild(notes);
 }
 setTimeout(function(){win.print();},300);
}

function exportPDF(id){
 const recipe=recipes.find(r=>r.id===id);
 if(!recipe)return;
 if(typeof pdfMake==='undefined'){
   alert('PDF модуль не загружен');
   return;
 }
 const content=[];
 content.push({text:recipe.name,style:'header'});
 content.push({text:'ТЕХНОЛОГИЧЕСКАЯ КАРТА',style:'subtitle'});
 content.push({text:'Нужный вес: '+recipe.targetWeight+' гр',margin:[0,0,0,4]});
 content.push({text:'Форма круглая: '+recipe.roundForm,margin:[0,0,0,2]});
 content.push({text:'Форма квадратная: '+recipe.squareForm,margin:[0,0,0,15]});
 const categories=[...new Set(recipe.ingredients.map(i=>i.category).filter(Boolean))];
 categories.forEach(cat=>{
   content.push({text:cat,style:'subheader'});
   recipe.ingredients
    .filter(i=>i.category===cat)
    .forEach(i=>{
      content.push({text:i.name+' — '+Math.round(Number(i.weight)||0)+' гр'});
    });
   if(recipe.technology && recipe.technology[cat]){
     content.push({text:'Технология: '+recipe.technology[cat]});
   }
 });
 if(recipe.notes){
   content.push({text:'Примечания: '+recipe.notes});
 }
 content.push({text:'',margin:[0,20,0,0]});
 content.push({text:'Себестоимость: '+calculateCost(recipe)+' ₽'});
 content.push({text:'Цена продажи: '+(recipe.salePrice||0)+' ₽'});
 content.push({text:'Чистая прибыль: '+calculateProfit(recipe)+' ₽'});
 const docDefinition={
   content:content,
   defaultStyle:{font:'Times',fontSize:10,lineHeight:1.1},
   styles:{
     header:{fontSize:15,bold:true,margin:[0,6,0,3]},
     subtitle:{fontSize:5,margin:[0,0,0,4]},
     subheader:{fontSize:12,bold:true,margin:[0,6,0,3]}
   },
   pageMargins:[40,40,40,40]
 };
 pdfMake.createPdf(docDefinition).download((recipe.name||'Техкарта')+'.pdf');
}

function runTests(){
 console.assert(Array.isArray(recipes));
 console.assert(Array.isArray(ingredientBase));
 console.assert(typeof openRecipe==='function');
 console.assert(typeof printShoppingList==='function');
}

renderCarousel();
renderIngredientBase();
runTests();
</script>
</body>
</html>
