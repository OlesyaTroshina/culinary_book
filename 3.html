<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Кулинарная книга — исправленный UI</title>
<style>
:root{--bg:#f8f4ee;--panel:#ffffff;--line:#eadfce;--text:#5a3d24}
*{box-sizing:border-box} body{margin:0;padding:18px;background:var(--bg);font-family:Arial,sans-serif;color:var(--text)}
.wrapper{display:grid;grid-template-columns:420px 1fr;gap:18px}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:20px}
.search{position:relative}.search input{width:100%;padding:16px 50px 16px 16px;border:2px solid #d9ab58;border-radius:16px}
.search span{position:absolute;right:18px;top:14px;color:#d9ab58;font-size:22px}
.recipe-list,.table{margin-top:14px;border:1px solid var(--line);border-radius:16px;overflow:hidden}
.recipe-item,.row{display:grid;grid-template-columns:1fr 120px;gap:12px;padding:14px;border-bottom:1px solid var(--line)}
.recipe-item:last-child,.row:last-child{border-bottom:none}
.btn{padding:14px 18px;border:none;border-radius:14px;font-weight:700;cursor:pointer}
.purple{background:#c8a7f0}.green{background:#b8dba8}.red{background:#f5b0a8}.gold{background:#f0c87a}
.header{display:flex;justify-content:space-between;align-items:center}
.actions{display:flex;gap:10px}
.recipe-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin:18px 0}
.field input{width:100%;padding:12px;border:1px solid var(--line);border-radius:12px}
.section{margin-top:16px;border:1px solid var(--line);border-radius:16px;padding:16px}
.section h3{margin:0 0 12px}
.table .row{grid-template-columns:160px 1fr 120px}
.footer-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:18px}
</style>
</head>
<body>
<div class="wrapper">
  <aside>
    <div class="panel">
      <h2>Книга рецептов</h2>
      <div class="search">
        <input placeholder="Поиск рецептов...">
        <span>🔍</span>
      </div>
      <div class="recipe-list" id="recipeList"></div>
      <button id="btnAddRecipe" class="btn purple" style="width:100%;margin-top:14px">＋ Добавить рецепт</button>
    </div>
    <div class="panel"><div style="display:flex;justify-content:space-between;align-items:center"><h3>База ингредиентов и материалов</h3><button id="btnToggleBase" class="btn gold">Развернуть базу</button></div><div id="baseContent" style="display:none;margin-top:12px">Список ингредиентов и материалов</div></div>
    <div class="panel"><div style="display:flex;justify-content:space-between;align-items:center"><h3>Данные заказа и примечания</h3><button id="btnToggleOrder" class="btn gold">Развернуть данные</button></div><div id="orderContent" style="display:none;margin-top:12px">Имя заказчика, дата, комментарии</div></div>
    <div class="panel"><div style="display:flex;justify-content:space-between;align-items:center"><h3>Финансовая информация</h3><button id="btnToggleFinance" class="btn gold">Развернуть информацию</button></div><div id="financeContent" style="display:none;margin-top:12px">Себестоимость, прибыль, наценка</div></div>
  </aside>

  <main>
    <div class="panel">
      <div class="header">
        <h2>Шоколадный торт</h2>
        <div class="actions">
          <button id="btnSaveRecipe" class="btn green">Сохранить рецепт</button>
          <button id="btnRecalculate" class="btn purple">Обновить расчёт</button>
          <button id="btnDeleteRecipe" class="btn red">Удалить рецепт</button>
        </div>
      </div>

      <div class="recipe-grid">
        <div class="field"><label>Начальный вес</label><input value="1200"></div>
        <div class="field"><label>Начальная форма</label><input value="18"></div>
        <div class="field"><label>Нужный вес</label><input value="1500"></div>
        <div class="field"><label>Круглая форма</label><input value="20"></div>
        <div class="field"><label>Квадратная форма</label><input value="18"></div>
      </div>

      <div class="section">
        <h3>Бисквит</h3>
        <div class="table" id="ingredientsTable"></div>
      </div>

      <button id="btnAddIngredient" class="btn purple">＋ Добавить ингредиент</button>

      <div class="footer-actions">
        <button id="btnPrintShopping" class="btn">Печать закупки</button>
        <button id="btnPrintTech" class="btn purple">Печать техкарты</button>
        <button id="btnPrintCost" class="btn green">Таблица себестоимости</button>
        <button id="btnSavePdf" class="btn gold">Сохранить PDF</button>
      </div>
    </div>
  </main>
</div>

<script>
const ingredients=[
  {category:'Бисквит',name:'Мука пшеничная',qty:187.5,unit:'г'},
  {category:'Бисквит',name:'Сахар',qty:187.5,unit:'г'},
  {category:'Бисквит',name:'Яйцо куриное',qty:300,unit:'г'},
  {category:'Декор',name:'Посыпка',qty:12.45,unit:'г'},
  {category:'Упаковка',name:'Коробка',qty:1,unit:'шт'}
];

function normalizeQty(value,unit){
  const num=Number(value)||0;
  return Math.round(num);
}

function formatQty(value,unit){
  const num=normalizeQty(value,unit);
  return String(num);
}

function renderRecipes(){
  const list=document.getElementById('recipeList');
  list.innerHTML=['Шоколадный торт','Красный бархат','Морковный торт'].map(r=>`<div class="recipe-item"><div>${r}</div><div>1200 г</div></div>`).join('');
}

function renderIngredients(){
  const table=document.getElementById('ingredientsTable');
  table.innerHTML=ingredients.map(i=>`<div class="row"><div>${i.category}</div><div>${i.name}</div><div>${formatQty(i.qty,i.unit)} ${i.unit}</div></div>`).join('');
}

function toggleBase(){
  const block=document.getElementById('baseContent');
  const isHidden=getComputedStyle(block).display==='none';
  block.style.display=isHidden?'block':'none';
  document.getElementById('btnToggleBase').textContent=isHidden?'Свернуть базу':'Развернуть базу';
}
function toggleOrder(){
  const block=document.getElementById('orderContent');
  const isHidden=getComputedStyle(block).display==='none';
  block.style.display=isHidden?'block':'none';
  document.getElementById('btnToggleOrder').textContent=isHidden?'Свернуть данные':'Развернуть данные';
}
function toggleFinance(){
  const block=document.getElementById('financeContent');
  const isHidden=getComputedStyle(block).display==='none';
  block.style.display=isHidden?'block':'none';
  document.getElementById('btnToggleFinance').textContent=isHidden?'Свернуть информацию':'Развернуть информацию';
}
function addRecipe(){const list=document.getElementById('recipeList');const item=document.createElement('div');item.className='recipe-item';item.innerHTML='<div>Новый рецепт</div><div>0 г</div>';list.prepend(item);}
function saveRecipe(){document.title='Рецепт сохранён ✓';}
function recalculateRecipe(){ingredients.forEach(i=>i.qty=Math.round(i.qty));renderIngredients();}
function deleteRecipe(){const list=document.getElementById('recipeList');if(list.firstElementChild) list.firstElementChild.remove();}
function addIngredient(){ingredients.push({category:'Новое',name:'Новый ингредиент',qty:1,unit:'г'});renderIngredients();}
function showStatus(message){
  let box=document.getElementById('appStatus');
  if(!box){
    box=document.createElement('div');
    box.id='appStatus';
    box.style.position='fixed';
    box.style.right='18px';
    box.style.bottom='18px';
    box.style.zIndex='9999';
    box.style.background='#fff7e8';
    box.style.border='1px solid #eadfce';
    box.style.borderRadius='16px';
    box.style.padding='12px 16px';
    box.style.boxShadow='0 10px 25px rgba(0,0,0,.12)';
    document.body.appendChild(box);
  }
  box.textContent=message;
  clearTimeout(showStatus.timer);
  showStatus.timer=setTimeout(()=>box.remove(),1800);
}
function printShopping(){showStatus('Печать закупки готова');}
function printTechCard(){showStatus('Печать техкарты готова');}
function printCostTable(){showStatus('Таблица себестоимости готова');}
function savePDF(){showStatus('PDF подготовлен');}

function runTests(){
  const errors=[];
  if(typeof toggleBase!=='function') errors.push('toggleBase не подключена');
  if(typeof addRecipe!=='function') errors.push('addRecipe не подключена');

  const orderBlock=document.getElementById('orderContent');
  const baseBlock=document.getElementById('baseContent');
  const financeBlock=document.getElementById('financeContent');

  if(!orderBlock) errors.push('orderContent не найден');
  if(!baseBlock) errors.push('baseContent не найден');
  if(!financeBlock) errors.push('financeContent не найден');

  if(formatQty(12.456,'г')!=='12') errors.push('Ошибка округления граммов');
  if(formatQty(2.9,'шт')!=='3') errors.push('Ошибка округления штучных значений');

  if(errors.length){
    console.error('Проверка приложения:', errors.join('; '));
    showStatus('Есть ошибки в проверке: '+errors.length);
    return false;
  }
  console.log('Проверка приложения пройдена');
  return true;
}

function bindActions(){
 const bind=(id,fn)=>{
   const el=document.getElementById(id);
   if(!el){console.error('Кнопка не найдена:',id);return;}
   el.addEventListener('click',fn);
 };
 bind('btnAddRecipe',addRecipe);
 bind('btnToggleBase',toggleBase);
 bind('btnToggleOrder',toggleOrder);
 bind('btnToggleFinance',toggleFinance);
 bind('btnSaveRecipe',saveRecipe);
 bind('btnRecalculate',recalculateRecipe);
 bind('btnDeleteRecipe',deleteRecipe);
 bind('btnAddIngredient',addIngredient);
 bind('btnPrintShopping',printShopping);
 bind('btnPrintTech',printTechCard);
 bind('btnPrintCost',printCostTable);
 bind('btnSavePdf',savePDF);
}

document.addEventListener('DOMContentLoaded',()=>{
  renderRecipes();
  renderIngredients();
  bindActions();
  runTests();
});
</script>
</body>
</html>
